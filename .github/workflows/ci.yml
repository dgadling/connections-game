name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install ruff pytest fastapi sqlalchemy httpx
          # install any other deps from requirements files if present
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-test.txt ] && pip install -r requirements-test.txt || true
      - name: Ruff lint
        run: ruff check .
      - name: Pytest
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
