name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install ruff pytest fastapi sqlalchemy httpx
          # install any other deps from requirements files if present
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f requirements-test.txt ] && pip install -r requirements-test.txt || true
      - name: Ruff lint
        run: ruff check .
      - name: Pytest
        env:
          DISCORD_CLIENT_ID: test_client_id
          DISCORD_CLIENT_SECRET: test_discord_secret_xxx
          DISCORD_REDIRECT_URI: http://localhost/test
          DISCORD_OAUTH_FERNET_KEY: apzkrYXo_4Dsr3gK8IXnormnjtG3C3Xw3CL-Jzl84Os=
          SESSION_SECRET: test_session_secret_32_chars_min_xxx
          SUPERUSER_DISCORD_ID: "123456789"
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Test (component)
        run: npm test
      - name: Test (static)
        run: npm run test:static
      - name: Build
        run: npm run build
