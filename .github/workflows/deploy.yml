name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t us-central1-docker.pkg.dev/connections-500320/connections/connections-game:${{ github.sha }} -t us-central1-docker.pkg.dev/connections-500320/connections/connections-game:latest .

      - name: Push image
        run: |
          docker push us-central1-docker.pkg.dev/connections-500320/connections/connections-game:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/connections-500320/connections/connections-game:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy connections \
            --project=connections-500320 \
            --region=us-central1 \
            --image=us-central1-docker.pkg.dev/connections-500320/connections/connections-game:${{ github.sha }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=1 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="DISCORD_CLIENT_ID=1519114145864356001,REPLICA_URL=gcs://connections-game-litestream/db" \
            --set-secrets="DISCORD_CLIENT_SECRET=discord_oauth_client_secret:latest,SESSION_SECRET=session_secret:latest,SUPERUSER_DISCORD_ID=SUPERUSER_DISCORD_ID:latest,DISCORD_OAUTH_FERNET_KEY=DISCORD_OAUTH_FERNET_KEY:latest" \
            --quiet
