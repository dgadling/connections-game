[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Catch common bugs
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "B",   # flake8-bugbear – likely bugs
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501", # line too long – handled by formatter
    "B008", # function-call-in-default-argument – FastAPI Depends() is standard DI pattern
]

[tool.ruff.lint.per-file-ignores]
# Alembic env.py needs to set sys.path before importing app models
"alembic/env.py" = ["E402"]
# conftest.py patches middleware before importing app – intentional
"tests/conftest.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
