[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Catch common bugs
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "B",   # flake8-bugbear – likely bugs
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501", # line too long – handled by formatter
]

[tool.ruff.format]
quote-style = "double"
